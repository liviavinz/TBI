services:
  setup:
    build:
      context: .
      dockerfile: docker/python.Dockerfile
      target: setup
      args:
        USE_PROXY: "${USE_PROXY:-false}"
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        NO_PROXY: "${NO_PROXY:-}"
    container_name: tbi-setup
    env_file:
      - .env
    environment:
      SQLITE_DB_PATH: /data/tbi_database.sqlite
    volumes:
      - ./data:/data
      - ./logs:/logs
    restart: "no"

  sync:
    build:
      context: .
      dockerfile: docker/python.Dockerfile
      target: sync
      args:
        USE_PROXY: "${USE_PROXY:-false}"
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        NO_PROXY: "${NO_PROXY:-}"
    container_name: tbi-sync
    env_file:
      - .env
    environment:
      SQLITE_DB_PATH: /data/tbi_database.sqlite
    volumes:
      - ./data:/data
      - ./logs:/logs
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_completed_successfully

  dashboard:
    build:
      context: .
      dockerfile: docker/python.Dockerfile
      target: dashboard
      args:
        USE_PROXY: "${USE_PROXY:-false}"
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        NO_PROXY: "${NO_PROXY:-}"
    container_name: tbi-dashboard
    env_file:
      - .env
    environment:
      SQLITE_DB_PATH: /data/tbi_database.sqlite
    volumes:
      - ./data:/data
      - ./logs:/logs
    ports:
      - "8051:8051"
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_completed_successfully
      sync:
        condition: service_started